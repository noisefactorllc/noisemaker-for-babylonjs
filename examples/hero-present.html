<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Noisemaker for Babylon.js — hero</title>
<style>
  :root { color-scheme: dark }
  * { box-sizing: border-box }
  body { margin: 0; background: #0b0d12; color: #cdd3de;
         font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
         display: flex; align-items: stretch; min-height: 100vh }
  .dsl { width: 540px; flex: 0 0 540px; padding: 22px 22px 30px; background: #0e1117;
         border-right: 1px solid #1d2430 }
  .badge { display: inline-block; padding: 3px 9px; border-radius: 6px; background: #151b26;
           color: #8aa0c4; font-size: 11px; letter-spacing: .03em; margin-bottom: 14px }
  pre { margin: 0; font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 11.5px; line-height: 1.55; color: #aeb7c6; white-space: pre; tab-size: 2 }
  .stage { flex: 1; display: flex; flex-direction: column; align-items: center;
           justify-content: flex-start; padding: 40px 30px; gap: 14px }
  .label { font-size: 12.5px; color: #9aa6ba; letter-spacing: .02em }
  canvas#view { width: 600px; height: 600px; border-radius: 12px;
                box-shadow: 0 14px 50px rgba(0,0,0,.65); background: #000; image-rendering: auto }
  #status { font-size: 12px; color: #6f7889; font-family: ui-monospace, monospace }
</style>
</head>
<body>
  <div class="dsl">
    <div class="badge">Polymorphic DSL</div>
    <pre id="dsl">loading…</pre>
  </div>
  <div class="stage">
    <div class="label">Noisemaker for Babylon.js — published engine + BabylonBackend</div>
    <canvas id="view" width="512" height="512"></canvas>
    <div id="status">loading…</div>
  </div>
  <script src="./hero-bundle.js"></script>
</body>
</html>
